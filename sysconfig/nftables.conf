# Uncomment the include statement here to load the default config sample
# in /etc/nftables for nftables service.

#include "/etc/nftables/main.nft"

# To customize, either edit the samples in /etc/nftables, append further
# commands to the end of this file or overwrite it after first service
# start by calling: 'nft list ruleset >/etc/sysconfig/nftables.conf'.
table inet mitm {
  chain prerouting {
    type filter hook prerouting priority mangle;

    iifname "nat64mitm" ip protocol tcp meta mark set 8080
    iifname "nat64mitm" ip protocol udp meta mark set 8080
  }
}

table inet nat64 {

  chain postrouting {
    type nat hook postrouting priority srcnat;

    # tayga@pp01
    ip saddr 192.168.1.0/24 oif "eth0" snat to 10.64.8.1
    # tayga@pp03
    ip saddr 192.168.3.0/24 oif "eth0" snat to 10.64.8.3
    # tayga@tu00
    ip saddr 192.168.4.0/24 oif "eth0" snat to 10.64.8.4
    # tayga@tu10
    ip saddr 192.168.10.0/24 oif "eth0" snat to 10.64.8.10
    # tayga@tu20
    ip saddr 192.168.20.0/24 oif "eth0" snat to 10.64.8.20
    # tayga@warp
    ip saddr 192.168.35.0/24 oif "eth0" snat to 10.64.8.35
    # tayga@warp3030
    ip saddr 172.31.30.0/24 oif "eth0" snat to 10.64.8.35
    # tayga@warp3031
    ip saddr 172.31.31.0/24 oif "eth0" snat to 10.64.8.35
    # tayga@warp3032
    ip saddr 172.31.32.0/24 oif "eth0" snat to 10.64.8.35
    # tayga@warp3033
    ip saddr 172.31.33.0/24 oif "eth0" snat to 10.64.8.35
    # tayga@warp3034
    ip saddr 172.31.34.0/24 oif "eth0" snat to 10.64.8.35
    # tayga@warp3035
    ip saddr 172.31.35.0/24 oif "eth0" snat to 10.64.8.35
    # tayga@warp3036
    ip saddr 172.31.36.0/24 oif "eth0" snat to 10.64.8.35
    # tayga@warp3037
    ip saddr 172.31.37.0/24 oif "eth0" snat to 10.64.8.35
    # tayga@warp2
    ip saddr 192.168.34.0/24 oif "eth0" snat to 10.64.8.34
    # tayga@mitmproxy
    ip saddr 192.168.80.0/24 oif "eth0" snat to 10.64.8.4
  }

  chain forward {
    type filter hook forward priority 0;

    # 内->外
    iifname "nat64pp01" oifname "eth0" accept
    iifname "nat64pp03" oifname "eth0" accept
    iifname "nat64tu00" oifname "eth0" accept
    iifname "nat64tu10" oifname "eth0" accept
    iifname "nat64tu20" oifname "eth0" accept
    iifname "nat64warp" oifname "eth0" accept
    iifname "nat64warp3030" oifname "eth0" accept
    iifname "nat64warp3031" oifname "eth0" accept
    iifname "nat64warp3032" oifname "eth0" accept
    iifname "nat64warp3033" oifname "eth0" accept
    iifname "nat64warp3034" oifname "eth0" accept
    iifname "nat64warp3035" oifname "eth0" accept
    iifname "nat64warp3036" oifname "eth0" accept
    iifname "nat64warp3037" oifname "eth0" accept
    iifname "nat64warp2" oifname "eth0" accept
    iifname "nat64mitm" oifname "eth0" accept

    # 外->内 (establishedのみ)
    iifname "eth0" oifname "nat64pp01" ct state related,established accept
    iifname "eth0" oifname "nat64pp03" ct state related,established accept
    iifname "eth0" oifname "nat64tu00" ct state related,established accept
    iifname "eth0" oifname "nat64tu10" ct state related,established accept
    iifname "eth0" oifname "nat64tu20" ct state related,established accept
    iifname "eth0" oifname "nat64warp" ct state related,established accept
    iifname "eth0" oifname "nat64warp3030" ct state related,established accept
    iifname "eth0" oifname "nat64warp3031" ct state related,established accept
    iifname "eth0" oifname "nat64warp3032" ct state related,established accept
    iifname "eth0" oifname "nat64warp3033" ct state related,established accept
    iifname "eth0" oifname "nat64warp3034" ct state related,established accept
    iifname "eth0" oifname "nat64warp3035" ct state related,established accept
    iifname "eth0" oifname "nat64warp3036" ct state related,established accept
    iifname "eth0" oifname "nat64warp3037" ct state related,established accept
    iifname "eth0" oifname "nat64warp2" ct state related,established accept
    iifname "eth0" oifname "nat64mitm" ct state related,established accept
  }
}
